<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0420"/>
      <stop offset="50%" stop-color="#2a0a3a"/>
      <stop offset="100%" stop-color="#3d0a4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5e0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="120" cy="80" r="36" fill="url(#moon)"/>
  <circle cx="500" cy="225" r="320" fill="url(#glow)"/>
  <!-- Bagua centered -->
  <g transform="translate(290,85)">
    <circle cx="110" cy="140" r="125" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.6"/>
    <circle cx="110" cy="140" r="85" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.85"/>
    <!-- 8 trigrams -->
    <g stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round">
      <line x1="88" y1="25" x2="132" y2="25"/>
      <line x1="88" y1="33" x2="132" y2="33"/>
      <line x1="88" y1="41" x2="132" y2="41"/>
      <line x1="173" y1="58" x2="196" y2="89"/>
      <line x1="166" y1="64" x2="189" y2="95"/>
      <line x1="173" y1="76" x2="196" y2="107"/>
      <line x1="195" y1="120" x2="195" y2="160"/>
      <line x1="203" y1="120" x2="203" y2="160"/>
      <line x1="195" y1="120" x2="195" y2="160"/>
      <line x1="195" y1="120" x2="195" y2="160"/>
      <line x1="173" y1="222" x2="196" y2="191"/>
      <line x1="166" y1="216" x2="189" y2="185"/>
      <line x1="180" y1="229" x2="203" y2="198"/>
      <line x1="88" y1="255" x2="132" y2="255"/>
      <line x1="88" y1="247" x2="132" y2="247"/>
      <line x1="88" y1="239" x2="132" y2="239"/>
      <line x1="44" y1="191" x2="67" y2="222"/>
      <line x1="51" y1="185" x2="74" y2="216"/>
      <line x1="44" y1="191" x2="67" y2="222"/>
      <line x1="25" y1="120" x2="25" y2="160"/>
      <line x1="25" y1="120" x2="25" y2="160"/>
      <line x1="17" y1="120" x2="17" y2="160"/>
      <line x1="25" y1="120" x2="25" y2="160"/>
      <line x1="44" y1="58" x2="24" y2="89"/>
      <line x1="51" y1="64" x2="31" y2="95"/>
      <line x1="44" y1="76" x2="24" y2="107"/>
    </g>
    <!-- center monogram -->
    <circle cx="110" cy="140" r="42" fill="rgba(192,132,252,0.18)" stroke="url(#accent)" stroke-width="2"/>
    <text x="110" y="155" text-anchor="middle" font-family="serif" font-size="40" font-weight="700" fill="#c084fc">玄</text>
  </g>
  <!-- constellation in upper right -->
  <g stroke="rgba(192,132,252,0.25)" stroke-width="0.5">
    <line x1="660" y1="60" x2="700" y2="90"/>
    <line x1="700" y1="90" x2="740" y2="60"/>
    <circle cx="660" cy="60" r="2" fill="#c084fc"/>
    <circle cx="700" cy="90" r="2" fill="#c084fc"/>
    <circle cx="740" cy="60" r="2" fill="#c084fc"/>
  </g>
  <g stroke="rgba(192,132,252,0.35)" stroke-width="1" fill="none">
    <path d="M20,20 L40,20 M20,20 L20,40"/>
    <path d="M780,20 L760,20 M780,20 L780,40"/>
    <path d="M20,430 L40,430 M20,430 L20,410"/>
    <path d="M780,430 L760,430 M780,430 L780,410"/>
  </g>
</svg>
