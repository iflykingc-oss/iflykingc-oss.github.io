<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0420"/>
      <stop offset="50%" stop-color="#2a0a3a"/>
      <stop offset="100%" stop-color="#3d0a4a"/>
    </linearGradient>
    <linearGradient id="accent8" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow8" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5e0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg8)"/>
  <circle cx="640" cy="100" r="30" fill="url(#moon)"/>
  <circle cx="640" cy="200" r="280" fill="url(#glow8)"/>
  <!-- Bagua (8 trigrams) hexagram layout -->
  <g transform="translate(540,110)">
    <!-- outer circle -->
    <circle cx="100" cy="130" r="120" fill="none" stroke="url(#accent8)" stroke-width="2" opacity="0.6"/>
    <circle cx="100" cy="130" r="80" fill="none" stroke="url(#accent8)" stroke-width="1.5" opacity="0.8"/>
    <!-- 8 trigrams -->
    <g stroke="url(#accent8)" stroke-width="3" stroke-linecap="round">
      <!-- top: ☰ 乾 -->
      <line x1="80" y1="20" x2="120" y2="20"/>
      <line x1="80" y1="28" x2="120" y2="28"/>
      <line x1="80" y1="36" x2="120" y2="36"/>
      <!-- top-right: ☱ 兑 -->
      <line x1="158" y1="50" x2="180" y2="80"/>
      <line x1="151" y1="56" x2="173" y2="86"/>
      <line x1="158" y1="68" x2="180" y2="98"/>
      <!-- right: ☲ 离 -->
      <line x1="180" y1="110" x2="180" y2="150"/>
      <line x1="188" y1="110" x2="188" y2="150"/>
      <line x1="180" y1="110" x2="180" y2="150"/>
      <line x1="180" y1="110" x2="180" y2="150"/>
      <!-- bottom-right: ☳ 震 -->
      <line x1="158" y1="210" x2="180" y2="180"/>
      <line x1="151" y1="204" x2="173" y2="174"/>
      <line x1="165" y1="217" x2="187" y2="187"/>
      <!-- bottom: ☷ 坤 -->
      <line x1="80" y1="240" x2="120" y2="240"/>
      <line x1="80" y1="232" x2="120" y2="232"/>
      <line x1="80" y1="224" x2="120" y2="224"/>
      <!-- bottom-left: ☵ 坎 -->
      <line x1="20" y1="180" x2="42" y2="210"/>
      <line x1="27" y1="174" x2="49" y2="204"/>
      <line x1="20" y1="180" x2="42" y2="210"/>
      <!-- left: ☶ 艮 -->
      <line x1="20" y1="110" x2="20" y2="150"/>
      <line x1="20" y1="110" x2="20" y2="150"/>
      <line x1="12" y1="110" x2="12" y2="150"/>
      <line x1="20" y1="110" x2="20" y2="150"/>
      <!-- top-left: ☴ 巽 -->
      <line x1="42" y1="50" x2="20" y2="80"/>
      <line x1="49" y1="56" x2="27" y2="86"/>
      <line x1="42" y1="68" x2="20" y2="98"/>
    </g>
    <!-- center: 玄机子 monogram -->
    <circle cx="100" cy="130" r="38" fill="rgba(192,132,252,0.15)" stroke="url(#accent8)" stroke-width="2"/>
    <text x="100" y="142" text-anchor="middle" font-family="serif" font-size="34" font-weight="700" fill="#c084fc">玄</text>
  </g>
  <!-- decorative constellation lines -->
  <g stroke="rgba(192,132,252,0.2)" stroke-width="0.5">
    <line x1="50" y1="50" x2="120" y2="80"/>
    <line x1="120" y1="80" x2="200" y2="40"/>
    <circle cx="50" cy="50" r="1.5" fill="#c084fc"/>
    <circle cx="120" cy="80" r="1.5" fill="#c084fc"/>
    <circle cx="200" cy="40" r="1.5" fill="#c084fc"/>
  </g>
  <g font-family="Inter, -apple-system, sans-serif">
    <text x="60" y="290" font-size="14" font-weight="600" fill="#c084fc" letter-spacing="2" font-family="JetBrains Mono, monospace">DESTINY READING</text>
    <text x="60" y="340" font-size="42" font-weight="800" fill="#fff" letter-spacing="-0.02em">命运图谱 LifeChart</text>
    <text x="60" y="370" font-size="15" fill="#94a3b8">玄机子 AI 大师 · 八字紫微</text>
  </g>
</svg>
