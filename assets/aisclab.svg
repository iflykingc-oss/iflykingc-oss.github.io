<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#15151c"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(148,163,184,0.15)"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#dots)"/>
  <!-- empty box centered -->
  <g transform="translate(290,90)">
    <rect x="0" y="0" width="220" height="240" rx="14" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="8 6"/>
    <!-- big ? -->
    <text x="110" y="135" text-anchor="middle" font-family="serif" font-size="100" font-weight="700" fill="rgba(148,163,184,0.45)">?</text>
    <text x="110" y="175" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="rgba(148,163,184,0.75)" letter-spacing="3">EMPTY REPO</text>
    <!-- file ghost rows -->
    <g opacity="0.25">
      <rect x="32" y="30" width="100" height="6" rx="3" fill="#475569"/>
      <rect x="32" y="44" width="80" height="6" rx="3" fill="#475569"/>
      <rect x="32" y="200" width="60" height="6" rx="3" fill="#475569"/>
      <rect x="32" y="214" width="90" height="6" rx="3" fill="#475569"/>
    </g>
  </g>
  <g stroke="rgba(148,163,184,0.3)" stroke-width="1" fill="none">
    <path d="M20,20 L40,20 M20,20 L20,40"/>
    <path d="M780,20 L760,20 M780,20 L780,40"/>
    <path d="M20,430 L40,430 M20,430 L20,410"/>
    <path d="M780,430 L760,430 M780,430 L780,410"/>
  </g>
</svg>
