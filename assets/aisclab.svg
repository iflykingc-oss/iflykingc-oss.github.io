<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#15151c"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(148,163,184,0.15)"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg9)"/>
  <rect width="800" height="450" fill="url(#dots)"/>
  <!-- empty box with dashed border + question mark -->
  <g transform="translate(440,90)">
    <rect x="0" y="0" width="280" height="240" rx="14" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="8 6"/>
    <!-- big ? -->
    <text x="140" y="135" text-anchor="middle" font-family="serif" font-size="100" font-weight="700" fill="rgba(148,163,184,0.4)">?</text>
    <text x="140" y="175" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="rgba(148,163,184,0.7)" letter-spacing="3">EMPTY REPO</text>
    <!-- file ghost rows -->
    <g opacity="0.25">
      <rect x="40" y="30" width="100" height="6" rx="3" fill="#475569"/>
      <rect x="40" y="44" width="80" height="6" rx="3" fill="#475569"/>
      <rect x="40" y="200" width="60" height="6" rx="3" fill="#475569"/>
      <rect x="40" y="214" width="90" height="6" rx="3" fill="#475569"/>
    </g>
  </g>
  <g font-family="Inter, -apple-system, sans-serif">
    <text x="60" y="260" font-size="14" font-weight="600" fill="#64748b" letter-spacing="2" font-family="JetBrains Mono, monospace">ARCHIVED · 2026-04</text>
    <text x="60" y="320" font-size="42" font-weight="800" fill="#94a3b8" letter-spacing="-0.02em">aisclab</text>
    <text x="60" y="350" font-size="15" fill="#64748b">空仓库 · 早期原型沙盒</text>
  </g>
