<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#1c1c24"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="500" cy="225" r="320" fill="url(#glow)"/>

  <!-- Asset grid: 6 image cards in 3x2 with different gradients + AI tags -->
  <g transform="translate(255,85)">
    <!-- card 1 -->
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="90" height="90" rx="10" fill="url(#grad1)" opacity="0.85"/>
      <rect x="6" y="6" width="78" height="64" rx="6" fill="rgba(0,0,0,0.18)"/>
      <circle cx="78" cy="80" r="7" fill="#4ade80" stroke="#0a0a0e" stroke-width="1.5"/>
      <rect x="6" y="76" width="50" height="4" rx="2" fill="rgba(255,255,255,0.8)"/>
    </g>
    <!-- card 2 -->
    <g transform="translate(100,0)">
      <rect x="0" y="0" width="90" height="90" rx="10" fill="url(#grad2)" opacity="0.85"/>
      <rect x="6" y="6" width="78" height="64" rx="6" fill="rgba(0,0,0,0.18)"/>
      <circle cx="78" cy="80" r="7" fill="#4ade80" stroke="#0a0a0e" stroke-width="1.5"/>
      <rect x="6" y="76" width="40" height="4" rx="2" fill="rgba(255,255,255,0.8)"/>
    </g>
    <!-- card 3 -->
    <g transform="translate(200,0)">
      <rect x="0" y="0" width="90" height="90" rx="10" fill="url(#grad3)" opacity="0.85"/>
      <rect x="6" y="6" width="78" height="64" rx="6" fill="rgba(0,0,0,0.18)"/>
      <circle cx="78" cy="80" r="7" fill="rgba(148,163,184,0.4)" stroke="#0a0a0e" stroke-width="1.5"/>
      <rect x="6" y="76" width="55" height="4" rx="2" fill="rgba(255,255,255,0.8)"/>
    </g>

    <!-- card 4 -->
    <g transform="translate(0,110)">
      <rect x="0" y="0" width="90" height="90" rx="10" fill="url(#grad2)" opacity="0.7"/>
      <rect x="6" y="6" width="78" height="64" rx="6" fill="rgba(0,0,0,0.18)"/>
      <circle cx="78" cy="80" r="7" fill="#fbbf24" stroke="#0a0a0e" stroke-width="1.5"/>
      <rect x="6" y="76" width="45" height="4" rx="2" fill="rgba(255,255,255,0.7)"/>
    </g>
    <!-- card 5 -->
    <g transform="translate(100,110)">
      <rect x="0" y="0" width="90" height="90" rx="10" fill="url(#grad3)" opacity="0.7"/>
      <rect x="6" y="6" width="78" height="64" rx="6" fill="rgba(0,0,0,0.18)"/>
      <circle cx="78" cy="80" r="7" fill="#4ade80" stroke="#0a0a0e" stroke-width="1.5"/>
      <rect x="6" y="76" width="60" height="4" rx="2" fill="rgba(255,255,255,0.8)"/>
    </g>
    <!-- card 6 -->
    <g transform="translate(200,110)">
      <rect x="0" y="0" width="90" height="90" rx="10" fill="url(#grad1)" opacity="0.7"/>
      <rect x="6" y="6" width="78" height="64" rx="6" fill="rgba(0,0,0,0.18)"/>
      <circle cx="78" cy="80" r="7" fill="#4ade80" stroke="#0a0a0e" stroke-width="1.5"/>
      <rect x="6" y="76" width="35" height="4" rx="2" fill="rgba(255,255,255,0.8)"/>
    </g>
  </g>

  <!-- Floating mini-program icon -->
  <g transform="translate(330,295)">
    <rect x="0" y="0" width="48" height="38" rx="6" fill="none" stroke="rgba(148,163,184,0.5)" stroke-width="1.5"/>
    <circle cx="10" cy="10" r="3" fill="rgba(148,163,184,0.5)"/>
    <circle cx="22" cy="10" r="3" fill="rgba(148,163,184,0.5)"/>
    <circle cx="34" cy="10" r="3" fill="rgba(148,163,184,0.5)"/>
    <rect x="10" y="18" width="28" height="3" rx="1.5" fill="rgba(148,163,184,0.5)"/>
    <rect x="10" y="25" width="20" height="3" rx="1.5" fill="rgba(148,163,184,0.5)"/>
  </g>

  <!-- "AI" sparkle next to grid -->
  <g transform="translate(580,80)" stroke="rgba(167,139,250,0.7)" stroke-width="1.5" fill="none">
    <path d="M0,0 L8,0 M4,-4 L4,4 M-4,0 L4,0"/>
    <path d="M0,40 L5,40 M2.5,37.5 L2.5,42.5"/>
  </g>
  <g transform="translate(450,260)" stroke="rgba(148,163,184,0.5)" stroke-width="1.5" fill="none">
    <path d="M0,0 L6,0 M3,-3 L3,3"/>
  </g>

  <!-- corner marks -->
  <g stroke="rgba(148,163,184,0.35)" stroke-width="1" fill="none">
    <path d="M20,20 L40,20 M20,20 L20,40"/>
    <path d="M780,20 L760,20 M780,20 L780,40"/>
    <path d="M20,430 L40,430 M20,430 L20,410"/>
    <path d="M780,430 L760,430 M780,430 L780,410"/>
  </g>
</svg>
