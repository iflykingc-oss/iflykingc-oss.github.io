<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#031a1a"/>
      <stop offset="100%" stop-color="#0a2e2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="500" cy="225" r="320" fill="url(#glow)"/>
  <!-- stacked chat bubbles centered -->
  <g transform="translate(230,80)">
    <rect x="0" y="0" width="200" height="52" rx="26" fill="rgba(45,212,191,0.18)" stroke="url(#accent)" stroke-width="1.5"/>
    <rect x="40" y="80" width="240" height="52" rx="26" fill="rgba(6,182,212,0.25)" stroke="url(#accent)" stroke-width="1.5"/>
    <rect x="0" y="160" width="220" height="52" rx="26" fill="rgba(45,212,191,0.18)" stroke="url(#accent)" stroke-width="1.5"/>
    <rect x="40" y="240" width="200" height="52" rx="26" fill="rgba(6,182,212,0.25)" stroke="url(#accent)" stroke-width="1.5"/>
    <!-- inner content -->
    <circle cx="100" cy="26" r="4" fill="rgba(255,255,255,0.5)"/>
    <circle cx="120" cy="26" r="4" fill="rgba(255,255,255,0.5)"/>
    <circle cx="140" cy="26" r="4" fill="rgba(255,255,255,0.5)"/>
  </g>
  <g stroke="rgba(45,212,191,0.35)" stroke-width="1" fill="none">
    <path d="M20,20 L40,20 M20,20 L20,40"/>
    <path d="M780,20 L760,20 M780,20 L780,40"/>
    <path d="M20,430 L40,430 M20,430 L20,410"/>
    <path d="M780,430 L760,430 M780,430 L780,410"/>
  </g>
</svg>
