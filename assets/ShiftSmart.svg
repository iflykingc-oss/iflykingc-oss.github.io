<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f1808"/>
      <stop offset="100%" stop-color="#3d2e0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="500" cy="225" r="320" fill="url(#glow)"/>
  <!-- calendar grid centered -->
  <g transform="translate(265,90)">
    <rect x="0" y="0" width="270" height="220" rx="14" fill="rgba(251,191,36,0.08)" stroke="url(#accent)" stroke-width="2.5"/>
    <rect x="0" y="0" width="270" height="36" rx="14" fill="rgba(251,191,36,0.18)"/>
    <rect x="0" y="22" width="270" height="14" fill="rgba(251,191,36,0.18)"/>
    <circle cx="22" cy="18" r="4" fill="#fbbf24"/>
    <circle cx="248" cy="18" r="4" fill="#fbbf24"/>
    <!-- weekday letters -->
    <g font-family="monospace" font-size="9" fill="rgba(251,191,36,0.5)">
      <text x="30" y="58">M</text>
      <text x="66" y="58">T</text>
      <text x="102" y="58">W</text>
      <text x="138" y="58">T</text>
      <text x="174" y="58">F</text>
      <text x="210" y="58">S</text>
      <text x="246" y="58">S</text>
    </g>
    <g fill="rgba(251,191,36,0.55)">
      <circle cx="36" cy="80" r="7"/><circle cx="72" cy="80" r="7"/><circle cx="108" cy="80" r="7"/><circle cx="144" cy="80" r="7"/><circle cx="180" cy="80" r="7"/><circle cx="216" cy="80" r="7"/><circle cx="252" cy="80" r="7"/>
      <circle cx="36" cy="120" r="7"/><circle cx="72" cy="120" r="7"/><circle cx="108" cy="120" r="7"/><circle cx="144" cy="120" r="7"/><circle cx="180" cy="120" r="7"/><circle cx="216" cy="120" r="7"/><circle cx="252" cy="120" r="7"/>
      <circle cx="36" cy="160" r="7"/><circle cx="72" cy="160" r="7"/><circle cx="108" cy="160" r="7"/><circle cx="144" cy="160" r="7"/><circle cx="180" cy="160" r="7"/><circle cx="216" cy="160" r="7"/><circle cx="252" cy="160" r="7"/>
    </g>
    <!-- highlighted shifts -->
    <circle cx="72" cy="120" r="13" fill="#fbbf24"/>
    <circle cx="180" cy="160" r="13" fill="#fb923c"/>
    <circle cx="144" cy="200" r="13" fill="#fbbf24"/>
    <circle cx="108" cy="120" r="13" fill="#fbbf24"/>
  </g>
  <g stroke="rgba(251,191,36,0.35)" stroke-width="1" fill="none">
    <path d="M20,20 L40,20 M20,20 L20,40"/>
    <path d="M780,20 L760,20 M780,20 L780,40"/>
    <path d="M20,430 L40,430 M20,430 L20,410"/>
    <path d="M780,430 L760,430 M780,430 L780,410"/>
  </g>
</svg>
