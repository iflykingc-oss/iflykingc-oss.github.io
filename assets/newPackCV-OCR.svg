<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04111a"/>
      <stop offset="100%" stop-color="#0a2435"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="500" cy="225" r="320" fill="url(#glow)"/>
  <!-- doc scan lines centered -->
  <g transform="translate(290,75)">
    <rect x="0" y="0" width="220" height="280" rx="10" fill="none" stroke="url(#accent)" stroke-width="2" stroke-dasharray="6 4"/>
    <line x1="-15" y1="50" x2="235" y2="50" stroke="#22d3ee" stroke-width="2.5" opacity="0.85"/>
    <line x1="-15" y1="95" x2="235" y2="95" stroke="#22d3ee" stroke-width="2.5" opacity="0.7"/>
    <line x1="-15" y1="140" x2="235" y2="140" stroke="#22d3ee" stroke-width="2.5" opacity="0.85"/>
    <line x1="-15" y1="185" x2="235" y2="185" stroke="#22d3ee" stroke-width="2.5" opacity="0.6"/>
    <line x1="-15" y1="230" x2="235" y2="230" stroke="#22d3ee" stroke-width="2.5" opacity="0.75"/>
    <!-- corner brackets inside -->
    <g stroke="#22d3ee" stroke-width="2" fill="none" opacity="0.7">
      <path d="M10,15 L10,30 L25,30"/>
      <path d="M210,15 L210,30 L195,30"/>
      <path d="M10,265 L10,250 L25,250"/>
      <path d="M210,265 L210,250 L195,250"/>
    </g>
  </g>
  <g stroke="rgba(34,211,238,0.35)" stroke-width="1" fill="none">
    <path d="M20,20 L40,20 M20,20 L20,40"/>
    <path d="M780,20 L760,20 M780,20 L780,40"/>
    <path d="M20,430 L40,430 M20,430 L20,410"/>
    <path d="M780,430 L760,430 M780,430 L780,410"/>
  </g>
</svg>
