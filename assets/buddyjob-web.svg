<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1024"/>
      <stop offset="50%" stop-color="#1a1247"/>
      <stop offset="100%" stop-color="#3d1758"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="500" cy="225" r="320" fill="url(#glow)"/>
  <!-- Resume doc + chat bubble, centered -->
  <g transform="translate(280,90)">
    <!-- resume doc -->
    <rect x="0" y="40" width="170" height="220" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <rect x="20" y="60" width="80" height="14" rx="4" fill="url(#accent)" opacity="0.9"/>
    <rect x="20" y="90" width="130" height="6" rx="3" fill="rgba(255,255,255,0.22)"/>
    <rect x="20" y="106" width="110" height="6" rx="3" fill="rgba(255,255,255,0.16)"/>
    <rect x="20" y="122" width="125" height="6" rx="3" fill="rgba(255,255,255,0.16)"/>
    <rect x="20" y="155" width="60" height="20" rx="10" fill="rgba(96,165,250,0.25)" stroke="rgba(96,165,250,0.5)"/>
    <rect x="20" y="185" width="70" height="20" rx="10" fill="rgba(167,139,250,0.25)" stroke="rgba(167,139,250,0.5)"/>
    <rect x="20" y="215" width="50" height="20" rx="10" fill="rgba(34,211,238,0.25)" stroke="rgba(34,211,238,0.5)"/>
    <!-- AI chat bubble overlapping -->
    <g transform="translate(110,0)">
      <rect x="0" y="0" width="170" height="80" rx="20" fill="url(#accent)" opacity="0.95"/>
      <path d="M30,80 L25,98 L48,82" fill="url(#accent)"/>
      <circle cx="40" cy="40" r="8" fill="rgba(255,255,255,0.4)"/>
      <circle cx="60" cy="40" r="8" fill="rgba(255,255,255,0.4)"/>
      <circle cx="80" cy="40" r="8" fill="rgba(255,255,255,0.4)"/>
    </g>
  </g>
  <g stroke="rgba(167,139,250,0.35)" stroke-width="1" fill="none">
    <path d="M20,20 L40,20 M20,20 L20,40"/>
    <path d="M780,20 L760,20 M780,20 L780,40"/>
    <path d="M20,430 L40,430 M20,430 L20,410"/>
    <path d="M780,430 L760,430 M780,430 L780,410"/>
  </g>
</svg>
