<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a0f"/>
      <stop offset="100%" stop-color="#0e2e1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a3e635" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="500" cy="225" r="320" fill="url(#glow)"/>
  <!-- radar circles + sweep centered -->
  <g transform="translate(310,75)">
    <circle cx="90" cy="150" r="140" fill="none" stroke="rgba(163,230,53,0.3)" stroke-width="2"/>
    <circle cx="90" cy="150" r="100" fill="none" stroke="rgba(163,230,53,0.45)" stroke-width="2"/>
    <circle cx="90" cy="150" r="55" fill="none" stroke="rgba(163,230,53,0.65)" stroke-width="2"/>
    <line x1="90" y1="10" x2="90" y2="290" stroke="rgba(163,230,53,0.4)" stroke-width="1.5"/>
    <line x1="-50" y1="150" x2="230" y2="150" stroke="rgba(163,230,53,0.4)" stroke-width="1.5"/>
    <line x1="-12" y1="48" x2="192" y2="252" stroke="rgba(163,230,53,0.4)" stroke-width="1.5"/>
    <line x1="-12" y1="252" x2="192" y2="48" stroke="rgba(163,230,53,0.4)" stroke-width="1.5"/>
    <path d="M90,150 L90,10 A140,140 0 0,1 200,68 Z" fill="url(#accent)" opacity="0.55"/>
    <circle cx="90" cy="150" r="6" fill="#a3e635"/>
    <!-- blips -->
    <circle cx="145" cy="100" r="4" fill="#a3e635"/>
    <circle cx="55" cy="200" r="4" fill="#a3e635"/>
    <circle cx="160" cy="180" r="3" fill="#a3e635"/>
  </g>
  <g stroke="rgba(163,230,53,0.35)" stroke-width="1" fill="none">
    <path d="M20,20 L40,20 M20,20 L20,40"/>
    <path d="M780,20 L760,20 M780,20 L780,40"/>
    <path d="M20,430 L40,430 M20,430 L20,410"/>
    <path d="M780,430 L760,430 M780,430 L780,410"/>
  </g>
</svg>
