<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0508"/>
      <stop offset="100%" stop-color="#3d0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="500" cy="225" r="320" fill="url(#glow)"/>
  <!-- Big target centered -->
  <g transform="translate(330,80)">
    <circle cx="70" cy="145" r="120" fill="none" stroke="rgba(251,113,133,0.22)" stroke-width="3"/>
    <circle cx="70" cy="145" r="90" fill="none" stroke="rgba(251,113,133,0.4)" stroke-width="3"/>
    <circle cx="70" cy="145" r="60" fill="url(#accent)"/>
    <circle cx="70" cy="145" r="60" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <circle cx="70" cy="145" r="20" fill="#fff"/>
    <!-- arrows hitting bullseye -->
    <line x1="135" y1="65" x2="73" y2="143" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round"/>
    <polygon points="73,143 65,138 65,148" fill="#fbbf24"/>
    <line x1="20" y1="85" x2="68" y2="145" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round"/>
    <polygon points="68,145 65,138 75,138" fill="#fbbf24"/>
    <line x1="145" y1="170" x2="73" y2="148" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round"/>
    <polygon points="73,148 68,138 80,141" fill="#fbbf24"/>
  </g>
  <g stroke="rgba(251,113,133,0.35)" stroke-width="1" fill="none">
    <path d="M20,20 L40,20 M20,20 L20,40"/>
    <path d="M780,20 L760,20 M780,20 L780,40"/>
    <path d="M20,430 L40,430 M20,430 L20,410"/>
    <path d="M780,430 L760,430 M780,430 L780,410"/>
  </g>
</svg>
