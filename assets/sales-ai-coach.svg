  <g font-family="Inter, -apple-system, sans-serif">
    <text x="60" y="260" font-size="14" font-weight="600" fill="#fb7185" letter-spacing="2" font-family="JetBrains Mono, monospace">SALES TRAINING</text>
    <text x="60" y="320" font-size="42" font-weight="800" fill="#fff" letter-spacing="-0.02em">Sales AI Coach</text>
    <text x="60" y="350" font-size="15" fill="#94a3b8">AI 陪练 · 8 维度评分</text>
